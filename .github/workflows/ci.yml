name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Host check + compile vpk/verkbox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex gawk m4 texinfo bc cpio patch \
            xz-utils gzip tar pkg-config perl python3 libelf-dev \
            qemu-system-x86 libcurl4-openssl-dev liblzma-dev zlib1g-dev

      - name: make check (host prerequisites)
        run: make check ARCH=x86_64

      - name: Compile vpk (the package manager)
        run: cc -O2 -Wall -o /tmp/vpk pkg/vpk/vpk.c -lcurl -llzma -lz

      - name: Compile verkbox (the coreutils)
        run: cc -O2 -Wall -o ./verkbox pkg/verkbox/verkbox.c

      - name: verkbox self-check vs GNU coreutils
        run: |
          set -e
          fail=0
          chk() { # chk <applet-args...> ; compares verkbox vs GNU byte-exact
            if ! diff <(LC_ALL=C ./verkbox "$@") <(LC_ALL=C "$1" "${@:2}") >/dev/null; then
              echo "MISMATCH: verkbox $*"; fail=1
            fi
          }
          printf 'c\na\nb\n' > /tmp/s.txt
          chk seq 1 3
          chk seq 2 2 10
          chk cat /etc/hostname
          chk head -n 2 /etc/passwd
          chk sort /tmp/s.txt
          # wc: counts must match (ignore GNU's wider column padding on pipes)
          g=$(LC_ALL=C wc -lwc /tmp/s.txt | awk '{print $1,$2,$3}')
          v=$(LC_ALL=C ./verkbox wc -lwc /tmp/s.txt | awk '{print $1,$2,$3}')
          [ "$g" = "$v" ] || { echo "wc MISMATCH: '$g' vs '$v'"; fail=1; }
          exit $fail

  lint:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on all shell scripts
        run: |
          rc=0
          for f in scripts/*.sh scripts/lib/*.sh boot/*.sh config/*.sh config/targets/*.sh; do
            [ -f "$f" ] || continue
            bash -n "$f" || { echo "SYNTAX ERROR: $f"; rc=1; }
          done
          exit $rc
